name: Update FRED Data

on:
  schedule:
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  fetch-fred:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os
          from datetime import datetime, timedelta

          API_KEY = os.environ["FRED_API_KEY"]
          BASE = "https://api.stlouisfed.org/fred/series/observations"
          cutoff = (datetime.now() - timedelta(days=365*10)).strftime("%Y-%m-%d")

          SERIES = {
            "payrolls":   "PAYEMS",
            "unrate":     "UNRATE",
            "u6":         "U6RATE",
            "lfpr":       "CIVPART",
            "primeAge":   "LNS12300060",
            "wages":      "AHETPI",
            "openings":   "JTSJOL",
            "quits":      "JTSQUR",
            "hires":      "JTSHIR",
            "layoffs":    "JTSLDR",
            "sConstruct": "USCONS",
            "sEduHealth": "USEHS",
            "sLeisure":   "USLAH",
            "sProfBus":   "USPBS",
            "sRetail":    "USTRADE",
            "sGovt":      "CES9000000001",
            "sManuf":     "MANEMP",
            "sFinancial": "USFIRE",
          }

          raw = {}
          for key, sid in SERIES.items():
            print(f"Fetching {sid}...")
            try:
              r = requests.get(BASE, params={
                "series_id": sid,
                "api_key": API_KEY,
                "file_type": "json",
                "observation_start": cutoff,
              })
              r.raise_for_status()
              data = r.json()
              raw[key] = {o["date"]: float(o["value"]) for o in data["observations"] if o["value"] != "."}
              print(f"  OK: {len(raw[key])} observations")
            except Exception as e:
              print(f"  WARNING: {sid} failed ({e}), skipping")
              raw[key] = {}

          all_dates = sorted(set(d for vals in raw.values() for d in vals.keys()))
          mo_names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

          rows = []
          for ym in all_dates:
            y, m = ym[:4], int(ym[5:7])
            label = mo_names[m-1] + "'" + ym[2:4]
            row = {"ym": ym, "label": label}
            for key in SERIES:
              row[key] = raw[key].get(ym, None)
            rows.append(row)

          for i, row in enumerate(rows):
            p = rows[i-1] if i > 0 else None
            p12 = rows[i-12] if i >= 12 else None
            row["payrollMoM"] = round(row["payrolls"] - p["payrolls"]) if p and row["payrolls"] and p["payrolls"] else None
            row["wagesYoYpct"] = round((row["wages"] - p12["wages"]) / p12["wages"] * 100, 2) if p12 and row["wages"] and p12["wages"] else None

          output = {
            "updated": datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"),
            "months": len(rows),
            "data": rows
          }

          with open("fred-data.json", "w") as f:
            json.dump(output, f, separators=(',', ':'))

          print(f"Done. {len(rows)} months saved.")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fred-data.json
          git diff --staged --quiet || git commit -m "Auto-update FRED data $(date +'%Y-%m-%d')"
          git push
