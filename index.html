function fmt(n,d=1){if(n==null)return"—";return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtK(n){if(n==null)return"—";return(n>0?"+":"")+Math.round(n).toLocaleString("en-US")+"K";}
function fmtM(n){if(n==null)return"—";return fmt(n/1000,1)+"M";}
function niceStep(range,tgt=5){const r=range/tgt;const m=Math.pow(10,Math.floor(Math.log10(r)));const f=[1,2,2.5,5,10].find(x=>x*m>=r);return(f||10)*m;}
function parseFRED(csv){const rows=csv.trim().split("\n").slice(1);const out={};rows.forEach(r=>{const[date,val]=r.split(",");if(date&&val&&val.trim()!=".")out[date.trim()]=parseFloat(val.trim());});return out;}
function filterLast10Yrs(map){const cutoff=new Date();cutoff.setFullYear(cutoff.getFullYear()-10);const cut=cutoff.toISOString().slice(0,10);const result={};Object.keys(map).filter(d=>d>=cut).forEach(d=>{result[d]=map[d];});return result;}
function toMonthly(map){return Object.entries(map).sort((a,b)=>a[0]<b[0]?-1:1).map(([date,value])=>({date,ym:date.slice(0,7),value}));}
function shortLabel(ym){const[y,m]=ym.split("-");const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1];return mo+"'"+(y.slice(2));}
function alignSeries(seriesMap){const ymSet=new Set();Object.values(seriesMap).forEach(arr=>arr.forEach(d=>ymSet.add(d.ym)));const yms=[...ymSet].sort();return yms.map(ym=>{const row={ym,label:shortLabel(ym)};Object.entries(seriesMap).forEach(([k,arr])=>{const found=arr.find(d=>d.ym===ym);row[k]=found?found.value:null;});return row;});}
function computeYoY(aligned,key){return aligned.map((row,i)=>{if(i<12)return{...row,[key+"YoY"]:null};const prev=aligned[i-12];const yoy=row[key]!=null&&prev[key]!=null?row[key]-prev[key]:null;return{...row,[key+"YoY"]:yoy};});}

function BarChartSVG({data,valKey="change",labelKey="label",height=165}){
  const W=580,H=height,PAD={t:10,r:8,b:26,l:50};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  if(!data||!data.length)return null;
  const vals=data.map(d=>d[valKey]??0);
  const maxV=Math.max(...vals,0),minV=Math.min(...vals,0);
  const range=maxV-minV||1;
  const step=niceStep(range,4);
  const ticks=[];
  for(let v=Math.floor(minV/step)*step;v<=Math.ceil(maxV/step)*step+.01;v=Math.round((v+step)*100)/100)ticks.push(v);
  const py=v=>PAD.t+iH*(1-(v-minV)/range);
  const zero=py(0);
  const bw=Math.max(Math.floor(iW/data.length)-2,2);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      {ticks.map(v=>(
        <g key={v}>
          <line x1={PAD.l} x2={W-PAD.r} y1={py(v)} y2={py(v)} stroke={BORDER} strokeDasharray="2 4"/>
          <text x={PAD.l-4} y={py(v)+4} textAnchor="end" fill={DIM} fontSize={10} fontFamily="monospace">{Math.round(v)}</text>
        </g>
      ))}
      <line x1={PAD.l} x2={W-PAD.r} y1={zero} y2={zero} stroke={RED} strokeOpacity={0.35} strokeDasharray="3 3"/>
      {data.map((d,i)=>{
        const v=d[valKey]??0;
        const bh=Math.max(Math.abs(v)/range*iH,1);
        const x=PAD.l+i*(iW/data.length)+1;
        const y=v>=0?py(v):zero;
        return(
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} fill={v>=0?"#2d6b4a":"#6b2d2d"} rx={1}/>
            {(data.length<=14||i%Math.max(1,Math.floor(data.length/10))===0||i===data.length-1)&&
              <text x={x+bw/2} y={H-3} textAnchor="middle" fill={DIM} fontSize={9} fontFamily="monospace">{d[labelKey]}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function MultiLineSVG({series=[],height=165,yFmt=v=>fmt(v),yDomain=null,showArea=false}){
  const W=540,H=height,PAD={t:10,r:10,b:26,l:42};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  const allVals=series.flatMap(s=>s.data.map(d=>d.value??null)).filter(v=>v!=null);
  if(!allVals.length)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:DIM,fontFamily:"monospace",fontSize:11}}>No data loaded</div>;
  const minV=yDomain?.[0]??Math.min(...allVals);
  const maxV=yDomain?.[1]??Math.max(...allVals);
  const range=maxV-minV||1;
  const step=niceStep(range,4);
  const ticks=[];
  for(let v=Math.floor(minV/step)*step;v<=Math.ceil(maxV/step)*step+.001;v=Math.round((v+step)*1000)/1000)ticks.push(v);
  const py=v=>PAD.t+iH*(1-(v-minV)/range);
  const refS=series.find(s=>s.data.length>0);
  const n=refS?.data.length??0;
  const px=i=>PAD.l+i*(iW/Math.max(n-1,1));
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      {ticks.map(v=>(
        <g key={v}>
          <line x1={PAD.l} x2={W-PAD.r} y1={py(v)} y2={py(v)} stroke={BORDER} strokeDasharray="2 4"/>
          <text x={PAD.l-4} y={py(v)+4} textAnchor="end" fill={DIM} fontSize={10} fontFamily="monospace">{yFmt(v)}</text>
        </g>
      ))}
      {series.map(s=>{
        const valid=s.data.filter(d=>d.value!=null);
        if(!valid.length)return null;
        const pts=s.data.map((d,i)=>d.value!=null?`${px(i)},${py(d.value)}`:null).filter(Boolean).join(" ");
        return(
          <g key={s.key}>
            {showArea&&<polygon points={`${px(0)},${py(minV)} ${pts} ${px(s.data.length-1)},${py(minV)}`} fill={s.color} fillOpacity={0.07}/>}
            <polyline points={pts} fill="none" stroke={s.color} strokeWidth={1.8} strokeDasharray={s.dashed?"5 3":""} strokeLinejoin="round"/>
            {s.data[s.data.length-1]?.value!=null&&<circle cx={px(s.data.length-1)} cy={py(s.data[s.data.length-1].value)} r={3} fill={s.color}/>}
          </g>
        );
      })}
      {refS?.data.map((d,i)=>{
        if(n<=14||(i%Math.floor(n/8)===0)||i===n-1)
          return <text key={i} x={px(i)} y={H-3} textAnchor="middle" fill={DIM} fontSize={9} fontFamily="monospace">{d.label}</text>;
        return null;
      })}
    </svg>
  );
}

function BeveridgeSVG({data=[],height=200}){
  const W=380,H=height,PAD={t:14,r:14,b:32,l:44};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  if(data.length<2)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:DIM,fontFamily:"monospace",fontSize:11}}>Load FRED data</div>;
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),rX=maxX-minX||1;
  const minY=Math.min(...ys),maxY=Math.max(...ys),rY=maxY-minY||1;
  const px=x=>PAD.l+iW*(x-minX)/rX;
  const py=y=>PAD.t+iH*(1-(y-minY)/rY);
  const xTicks=[3,4,5,6,7,8,9,10].filter(v=>v>=minX-.5&&v<=maxX+.5);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      {xTicks.map(v=>(
        <g key={v}>
          <line x1={px(v)} x2={px(v)} y1={PAD.t} y2={H-PAD.b} stroke={BORDER} strokeDasharray="2 4"/>
          <text x={px(v)} y={H-4} textAnchor="middle" fill={DIM} fontSize={9} fontFamily="monospace">{v}%</text>
        </g>
      ))}
      <text x={W/2} y={H} textAnchor="middle" fill={MUTED} fontSize={9} fontFamily="monospace">← Unemployment Rate</text>
      <polyline points={data.map(d=>`${px(d.x)},${py(d.y)}`).join(" ")} fill="none" stroke={BLUE} strokeOpacity={0.2} strokeWidth={1}/>
      {data.map((d,i)=>{
        const isLast=i===data.length-1;
        const alpha=0.2+0.8*(i/data.length);
        return(
          <g key={i}>
            <circle cx={px(d.x)} cy={py(d.y)} r={isLast?5:2} fill={isLast?GOLD:BLUE} fillOpacity={isLast?1:alpha}/>
            {isLast&&<text x={px(d.x)+7} y={py(d.y)+4} fill={GOLD} fontSize={9} fontFamily="monospace">{d.label}</text>}
            {(i===0||i===Math.floor(data.length/2))&&<text x={px(d.x)+5} y={py(d.y)-3} fill={DIM} fontSize={8} fontFamily="monospace">{d.label}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function Legend({items}){
  return(
    <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:10}}>
      {items.map(({color,label,dashed})=>(
        <div key={label} style={{display:"flex",alignItems:"center",gap:5,fontFamily:"monospace",fontSize:10,color:MUTED}}>
          <svg width={18} height={8}><line x1={0} x2={18} y1={4} y2={4} stroke={color} strokeWidth={2} strokeDasharray={dashed?"5 3":""}/></svg>
          {label}
        </div>
      ))}
    </div>
  );
}

function Card({title,children,style={}}){

    <div style={{background:PANEL,border:`1px solid ${BORDER}`,borderRadius:2,padding:"15px 17px",...style}}>
      {title&&<div style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",color:MUTED,marginBottom:11}}>{title}</div>}
      {children}
    </div>
  );
}

  }

  const lm_wages=last120.map(r=>({label:r.label,value:r.wagesYoYpct})).filter(r=>r.value!=null);

  const btnS=(p)=>({fontFamily:"monospace",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",padding:"9px 15px",borderRadius:2,cursor:"pointer",border:p?`1px solid ${GOLD}`:`1px solid ${BORDER}`,background:p?G_DIM:PANEL,color:p?GOLD:MUTED});
  const TABS=[["overview","Overview"],["labor","Labor Market"],["jolts","JOLTS"],["analysis","AI Analysis"],["newsletter","Newsletter"]];

  return(
    <div style={{fontFamily:"Georgia,serif",background:BG,minHeight:"100vh",color:TEXT}}>
      {/* Header */}
      <div style={{borderBottom:`1px solid ${BORDER}`,padding:"16px 28px 12px",display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:GOLD,marginBottom:3}}>PwC · ETRE Research</div>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:"normal",color:"#f0ebe3",margin:0}}>Employment Situation Monitor</h1>
        </div>
        <div style={{fontFamily:"monospace",fontSize:10,color:DIM,border:`1px solid ${BORDER}`,padding:"4px 10px",borderRadius:2}}>{current?.latestDate||"No data"} · BLS/FRED</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",padding:"0 28px",borderBottom:`1px solid ${BORDER}`,overflowX:"auto"}}>
        {TABS.map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{fontFamily:"monospace",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",padding:"10px 15px",cursor:"pointer",border:"none",background:"none",color:tab===id?GOLD:DIM,borderBottom:tab===id?`2px solid ${GOLD}`:"2px solid transparent",whiteSpace:"nowrap"}}>{lbl}</button>
        ))}
      </div>

      <div style={{padding:"20px 28px",maxWidth:1100}}>
  
      {/* FRED Key + Controls */}
                <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <span style={{fontFamily:"monospace",fontSize:10,color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase"}}>Anthropic Key:</span>
          <input type="password" value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem("anthrKey",e.target.value);}} placeholder="sk-ant-..." style={{fontFamily:"monospace",fontSize:11,background:PANEL,border:`1px solid ${apiKey?GREEN:BORDER}`,color:TEXT,padding:"6px 10px",borderRadius:2,width:260,outline:"none"}}/>
          {apiKey&&<span style={{fontFamily:"monospace",fontSize:10,color:GREEN}}>✓ set</span>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:18,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={loadDemo} style={btnS(false)}>▶ Demo Data</button>
          <button onClick={loadFREDHistory} style={btnS(true)}>📊 Load 10yr History</button>
          <label style={{...btnS(false),display:"inline-block"}}>📄 Upload BLS PDF<input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={handlePDF}/></label>
          {current&&!status&&<button onClick={runAnalysis} style={btnS(true)}>{analysis?"↻ Re-analyze":"✦ Run AI Analysis"}</button>}
        </div>

        {status?.type==="loading"&&<div style={{display:"flex",gap:5,alignItems:"center",marginBottom:12,fontFamily:"monospace",fontSize:11,color:MUTED}}>{[0,.2,.4].map((d,i)=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:GOLD,display:"inline-block",animation:`blink 1.2s ${d}s ease-in-out infinite`}}/>)}<span style={{marginLeft:6}}>{status.msg}</span></div>}
        {status?.type==="error"&&<div style={{background:"rgba(224,92,92,0.08)",border:"1px solid rgba(224,92,92,0.2)",padding:"9px 13px",borderRadius:2,fontFamily:"monospace",fontSize:11,color:RED,marginBottom:12}}>⚠ {status.msg}</div>}
        {status?.type==="ok"&&<div style={{background:"rgba(76,175,132,0.07)",border:"1px solid rgba(76,175,132,0.2)",padding:"9px 13px",borderRadius:2,fontFamily:"monospace",fontSize:11,color:GREEN,marginBottom:12}}>✓ {status.msg}</div>}

        {/* OVERVIEW */}
        {tab==="overview"&&(!current
          ?<div style={{paddingTop:60,textAlign:"center",color:DIM,fontFamily:"monospace",fontSize:12}}>Load demo data, fetch FRED history, or upload BLS PDF</div>
          :<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:14}}>
              {[
                {label:"Nonfarm Payrolls",val:fmtK(current.payrollChange),sub:"MoM change",color:(current.payrollChange||0)>=0?GREEN:RED,hi:true},
                {label:"U-3 Unemployment",val:fmt(current.unemploymentRate)+"%",sub:"Headline rate",color:TEXT},
                {label:"U-6 Real Unemp",val:fmt(current.u6Rate)+"%",sub:"Broad measure",color:TEXT},
                {label:"LFP Rate",val:fmt(current.laborForceParticipation)+"%",sub:"Overall",color:TEXT},
                {label:"Prime-Age LFP",val:fmt(current.primeAgeLFPR)+"%",sub:"Ages 25–54",color:TEXT},
                {label:"Wage Growth YoY",val:fmt(current.wagesYoY)+"%",sub:"Avg hourly earnings",color:TEXT},
              ].map((k,i)=>(
                <div key={i} style={{background:k.hi?G_DIM:PANEL,border:`1px solid ${k.hi?G_BDR:BORDER}`,padding:"12px 13px",borderRadius:2}}>
                  <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",color:MUTED,marginBottom:6}}>{k.label}</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:22,color:k.color,letterSpacing:"-1px",lineHeight:1,marginBottom:3}}>{k.val}</div>
                  <div style={{fontFamily:"monospace",fontSize:9,color:DIM}}>{k.sub}</div>
                </div>
              ))}
            </div>
            {current.payrollSeries?.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8,marginBottom:8}}>
                <Card title="Monthly Payroll Change (000s)"><BarChartSVG data={current.payrollSeries} valKey="change" labelKey="label"/></Card>
                <Card title="U-3 vs U-6 (%)">
                  <Legend items={[{color:BLUE,label:"U-3"},{color:ORANGE,label:"U-6",dashed:true}]}/>
                  <MultiLineSVG series={[{key:"u3",color:BLUE,data:current.unemploySeries.map(r=>({label:r.label,value:r.u3}))},{key:"u6",color:ORANGE,dashed:true,data:current.unemploySeries.map(r=>({label:r.label,value:r.u6}))}]} yFmt={v=>v+"%"}/>
                </Card>
              </div>
            )}
            <Card title="Sector Job Change — MoM (000s)" style={{marginBottom:8}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 40px"}}>
                {sortedSectors.map(([key,{label,change}])=>(
                  <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${BORDER}`}}>
                    <span style={{fontFamily:"monospace",fontSize:11,color:MUTED}}>{label}</span>
                    <span style={{fontFamily:"monospace",fontSize:12,fontWeight:"bold",color:(change??0)>=0?GREEN:RED}}>{change!=null?fmtK(change):"—"}</span>
                  </div>
                ))}
              </div>
            </Card>
            {current.notes&&<div style={{background:G_DIM,border:`1px solid ${G_BDR}`,borderRadius:2,padding:"9px 13px",fontFamily:"monospace",fontSize:10,color:GOLD,lineHeight:1.6}}>◆ {current.notes}</div>}
          </>
        )}

        {/* LABOR MARKET */}
        {tab==="labor"&&(!fred
          ?<div style={{paddingTop:40,color:DIM,fontFamily:"monospace",fontSize:12}}>Click "Load 10yr FRED History" to populate exhibits</div>
          :<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <Card title="U-3 vs U-6 Unemployment — 10 Year">
                <Legend items={[{color:BLUE,label:"U-3 (Headline)"},{color:ORANGE,label:"U-6 (Real/Broad)",dashed:true}]}/>
                <MultiLineSVG series={[{key:"u3",color:BLUE,data:lm_u3u6.map(r=>({label:r.label,value:r.u3}))},{key:"u6",color:ORANGE,dashed:true,data:lm_u3u6.map(r=>({label:r.label,value:r.u6}))}]} yFmt={v=>v+"%"} height={180}/>
                <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:8,lineHeight:1.5}}>U-6 includes marginally attached workers and those working part-time for economic reasons. The gap signals hidden labor market slack not captured by the headline rate.</div>
              </Card>
              <Card title="Labor Force Participation — 10 Year">
                <Legend items={[{color:GOLD,label:"Overall LFPR"},{color:GREEN,label:"Prime-Age 25–54",dashed:true}]}/>
                <MultiLineSVG series={[{key:"lfpr",color:GOLD,data:lm_lfpr.map(r=>({label:r.label,value:r.lfpr}))},{key:"prime",color:GREEN,dashed:true,data:lm_lfpr.map(r=>({label:r.label,value:r.primeAge}))}]} yFmt={v=>v+"%"} height={180}/>
                <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:8,lineHeight:1.5}}>Overall LFPR is suppressed by aging demographics. Prime-age LFPR strips boomer retirements — the cleaner signal for demand-side pressure on the unemployment rate.</div>
              </Card>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8,marginBottom:8}}>
              <Card title="Payroll Change MoM (000s) — 10 Year">
                <BarChartSVG data={last120.filter(r=>r.payrollMoM!=null).map(r=>({label:r.label,change:r.payrollMoM}))} valKey="change" labelKey="label"/>
              </Card>
              <Card title="Wage Growth YoY (%) — 10 Year">
                <MultiLineSVG series={[{key:"wages",color:PURPLE,data:lm_wages}]} yFmt={v=>fmt(v)+"%"} height={165} showArea={true}/>
              </Card>
            </div>
            <Card title="Sector Payroll Change — Year-over-Year (000s)">
              <BarChartSVG data={sectorYoY.map(s=>({label:s.label,change:s.yoy}))} valKey="change" labelKey="label" height={150}/>
            </Card>
          </>
        )}

        {/* JOLTS */}
        {tab==="jolts"&&(!fred||!joltsData.length
          ?<div style={{paddingTop:40,color:DIM,fontFamily:"monospace",fontSize:12}}>Load FRED history to see JOLTS data. Note: JOLTS releases ~6 weeks after the reference month.</div>
          :<>
            <div style={{fontFamily:"monospace",fontSize:10,color:MUTED,marginBottom:14,lineHeight:1.6}}>JOLTS (Job Openings and Labor Turnover Survey) — measures labor demand, churn, and worker confidence. Releases ~5–6 weeks after reference month.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <Card title="Job Openings — Level (Millions)">
                <MultiLineSVG series={[{key:"openings",color:BLUE,data:joltsData.map(r=>({label:r.label,value:r.openings}))}]} yFmt={v=>fmtM(v)} height={180} showArea={true}/>
                <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:6}}>Peak ~12M in early 2022. Declining trend signals easing labor demand and reduced employer competition for workers.</div>
              </Card>
              <Card title="Quits Rate (%) — Worker Confidence">
                <MultiLineSVG series={[{key:"quits",color:ORANGE,data:joltsRates.map(r=>({label:r.label,value:r.quits}))}]} yFmt={v=>fmt(v)+"%"} height={180}/>
                <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:6}}>Workers quit when confident they can find something better. The quits rate is the labor market's bottom-up confidence gauge.</div>
              </Card>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8,marginBottom:8}}>
              <Card title="Hires vs Layoffs Rate (%) — Labor Flow">
                <Legend items={[{color:GREEN,label:"Hires Rate"},{color:RED,label:"Layoffs Rate",dashed:true}]}/>
                <MultiLineSVG series={[{key:"hires",color:GREEN,data:joltsRates.map(r=>({label:r.label,value:r.hires}))},{key:"layoffs",color:RED,dashed:true,data:joltsRates.map(r=>({label:r.label,value:r.layoffs}))}]} yFmt={v=>fmt(v)+"%"} height={185}/>
              </Card>
              <Card title="Beveridge Curve">
                <BeveridgeSVG data={beveridge} height={200}/>
                <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:6,lineHeight:1.5}}>Rightward shift = structural mismatch. Inward = tightening efficiency. Gold dot = most recent month.</div>
              </Card>
            </div>
            {joltsRates.length>0&&(()=>{
              const lj=joltsRates[joltsRates.length-1];
              const pj=joltsRates.length>=13?joltsRates[joltsRates.length-13]:null;
              return(
                <Card title="JOLTS Summary — Latest Available">
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                    {[
                      {label:"Job Openings",val:lj.openings?fmtM(lj.openings):"—",yoy:pj?.openings&&lj.openings?fmtM(lj.openings-pj.openings):"—",color:BLUE},
                      {label:"Quits Rate",val:lj.quits?fmt(lj.quits)+"%":"—",yoy:pj?.quits&&lj.quits?fmt(lj.quits-pj.quits,1)+"pp":"—",color:ORANGE},
                      {label:"Hires Rate",val:lj.hires?fmt(lj.hires)+"%":"—",yoy:pj?.hires&&lj.hires?fmt(lj.hires-pj.hires,1)+"pp":"—",color:GREEN},
                      {label:"Layoffs Rate",val:lj.layoffs?fmt(lj.layoffs)+"%":"—",yoy:pj?.layoffs&&lj.layoffs?fmt(lj.layoffs-pj.layoffs,1)+"pp":"—",color:RED},
                    ].map((k,i)=>(
                      <div key={i} style={{background:BG,border:`1px solid ${BORDER}`,padding:"12px 14px",borderRadius:2}}>
                        <div style={{fontFamily:"monospace",fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em",color:MUTED,marginBottom:6}}>{k.label}</div>
                        <div style={{fontFamily:"Georgia,serif",fontSize:22,color:k.color,letterSpacing:"-0.5px"}}>{k.val}</div>
                        <div style={{fontFamily:"monospace",fontSize:9,color:DIM,marginTop:3}}>YoY: {k.yoy}</div>
                      </div>
                    ))}
                  </div>
                </Card>
              );
            })()}
          </>
        )}

        {/* AI ANALYSIS */}
        {tab==="analysis"&&(!analysis&&!status
          ?<div style={{paddingTop:40,color:DIM,fontFamily:"monospace",fontSize:12}}>{current?'Click "Run AI Analysis" above.':"Load data first."}</div>
          :analysis&&(
            <div style={{background:PANEL,border:`1px solid ${BORDER}`,borderRadius:2,padding:"26px 30px"}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#f0ebe3",lineHeight:1.45,borderLeft:`3px solid ${GOLD}`,paddingLeft:15,marginBottom:26}}>{analysis.headline}</div>
              {[["macro","Macro & Labor Market"],["cre","CRE Implications"],["sectorHighlights","Sector Highlights"],["joltsContext","JOLTS Context"]].map(([k,lbl])=>(
                analysis[k]&&<div key={k} style={{marginBottom:22}}>
                  <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:GOLD,borderBottom:"1px solid rgba(201,168,76,0.2)",paddingBottom:5,marginBottom:11}}>{lbl}</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:14.5,lineHeight:1.8,color:"#c0b8b0"}}>{analysis[k]}</div>
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:6}}>
                <div>
                  <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:RED,borderBottom:"1px solid rgba(224,92,92,0.2)",paddingBottom:5,marginBottom:10}}>Risk Flags</div>
                  {(analysis.riskFlags||[]).map((r,i)=><div key={i} style={{fontFamily:"monospace",fontSize:11,color:RED,marginBottom:6,display:"flex",gap:8}}><span>▲</span><span>{r}</span></div>)}
                </div>
                <div>
                  <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:GREEN,borderBottom:"1px solid rgba(76,175,132,0.2)",paddingBottom:5,marginBottom:10}}>Positive Signals</div>
                  {(analysis.positiveSignals||[]).map((p,i)=><div key={i} style={{fontFamily:"monospace",fontSize:11,color:GREEN,marginBottom:6,display:"flex",gap:8}}><span>●</span><span>{p}</span></div>)}
                </div>
              </div>
              {analysis.outlook&&<div style={{marginTop:22,padding:"12px 16px",background:G_DIM,border:`1px solid ${G_BDR}`,borderRadius:2,fontFamily:"Georgia,serif",fontSize:14,color:GOLD,fontStyle:"italic"}}>{analysis.outlook}</div>}
            </div>
          )
        )}

        {/* NEWSLETTER */}
        {tab==="newsletter"&&(!newsletter&&!status
          ?<div style={{paddingTop:40,color:DIM,fontFamily:"monospace",fontSize:12}}>{current?"Run AI Analysis to generate the newsletter.":"Load data first."}</div>
          :newsletter&&(
            <div style={{background:PANEL,border:`1px solid ${BORDER}`,borderRadius:2,padding:"30px 38px"}}>
              <div style={{borderBottom:`2px solid ${GOLD}`,paddingBottom:14,marginBottom:22,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:19,color:"#f0ebe3",marginBottom:3}}>Monthly Employment Commentary</div>
                  <div style={{fontFamily:"monospace",fontSize:10,color:DIM,letterSpacing:"0.1em",textTransform:"uppercase"}}>PwC ETRE Research · {current?.latestDate} · For Distribution</div>
                </div>
                <button onClick={()=>{navigator.clipboard.writeText(newsletter);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",padding:"6px 13px",border:`1px solid ${BORDER}`,background:"none",color:copied?GREEN:MUTED,cursor:"pointer",borderRadius:2}}>{copied?"✓ Copied":"Copy"}</button>
              </div>
              <div style={{fontFamily:"Georgia,serif",fontSize:15,lineHeight:1.85,color:"#c0b8b0",whiteSpace:"pre-line"}}>{newsletter}</div>
            </div>
          )
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
